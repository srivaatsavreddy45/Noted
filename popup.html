<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Noted</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div id="app">

    <!-- Header -->
    <header class="header">
      <div class="header-brand">
        <svg class="brand-icon" width="20" height="20" viewBox="0 0 20 20" fill="none">
          <rect x="2" y="2" width="7" height="7" rx="1.5" fill="currentColor" opacity="0.9"/>
          <rect x="11" y="2" width="7" height="7" rx="1.5" fill="currentColor" opacity="0.5"/>
          <rect x="2" y="11" width="7" height="7" rx="1.5" fill="currentColor" opacity="0.5"/>
          <rect x="11" y="11" width="7" height="7" rx="1.5" fill="currentColor" opacity="0.9"/>
        </svg>
        <span class="brand-name">Noted</span>
      </div>
      <div class="header-actions">
        <button class="icon-btn" id="searchToggle" title="Search">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><circle cx="6.5" cy="6.5" r="4" stroke="currentColor" stroke-width="1.5"/><path d="M11 11l2.5 2.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
        </button>
        <button class="icon-btn" id="settingsToggle" title="Settings">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="2" stroke="currentColor" stroke-width="1.5"/><path d="M8 1v2M8 13v2M1 8h2M13 8h2M3.05 3.05l1.41 1.41M11.54 11.54l1.41 1.41M3.05 12.95l1.41-1.41M11.54 4.46l1.41-1.41" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
        </button>
      </div>
    </header>

    <!-- Search bar (hidden by default) -->
    <div class="search-bar" id="searchBar" hidden>
      <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><circle cx="6.5" cy="6.5" r="4" stroke="currentColor" stroke-width="1.5"/><path d="M11 11l2.5 2.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
      <input type="text" id="searchInput" placeholder="Search tasks and notes…" autocomplete="off" />
      <button class="icon-btn" id="searchClose">
        <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M1 1l10 10M11 1L1 11" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
      </button>
    </div>

    <!-- Tab nav -->
    <nav class="tab-nav">
      <button class="tab-btn active" data-tab="tasks">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><rect x="1" y="1" width="12" height="12" rx="2" stroke="currentColor" stroke-width="1.4"/><path d="M4 7l2 2 4-4" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
        Tasks
        <span class="tab-count" id="taskCount">0</span>
      </button>
      <button class="tab-btn" data-tab="notes">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><rect x="1" y="1" width="12" height="12" rx="2" stroke="currentColor" stroke-width="1.4"/><path d="M4 4h6M4 7h6M4 10h3" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
        Notes
        <span class="tab-count" id="noteCount">0</span>
      </button>
    </nav>

    <!-- ===== TASKS TAB ===== -->
    <div class="tab-panel" id="tasksPanel">

      <!-- Quick add task -->
      <div class="quick-add" id="quickAddTask">
        <input type="text" id="taskInput" placeholder="Add a task…" autocomplete="off" maxlength="200" />
        <button class="add-btn" id="addTaskBtn" title="Add task">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M7 1v12M1 7h12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
        </button>
      </div>

      <!-- Task meta row (shown after typing) -->
      <div class="task-meta-row" id="taskMetaRow" hidden>
        <select id="taskPriority" class="meta-select">
          <option value="none">No priority</option>
          <option value="low">🟢 Low</option>
          <option value="medium">🟡 Medium</option>
          <option value="high">🔴 High</option>
        </select>
        <select id="taskTag" class="meta-select">
          <option value="">No tag</option>
          <option value="work">Work</option>
          <option value="personal">Personal</option>
          <option value="shopping">Shopping</option>
          <option value="health">Health</option>
          <option value="finance">Finance</option>
        </select>
        <input type="datetime-local" id="taskDue" class="meta-input" title="Due date" />
      </div>

      <!-- Filters -->
      <div class="filter-row">
        <button class="filter-chip active" data-filter="all">All</button>
        <button class="filter-chip" data-filter="active">Active</button>
        <button class="filter-chip" data-filter="completed">Done</button>
        <button class="filter-chip" data-filter="high">🔴 High</button>
        <div class="filter-spacer"></div>
        <button class="icon-btn sort-btn" id="sortBtn" title="Sort">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M1 3h12M3 7h8M5 11h4" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
        </button>
      </div>

      <!-- Task list -->
      <div class="item-list" id="taskList">
        <div class="empty-state" id="taskEmpty">
          <svg width="40" height="40" viewBox="0 0 40 40" fill="none"><rect x="6" y="6" width="28" height="28" rx="4" stroke="currentColor" stroke-width="1.5" opacity="0.3"/><path d="M13 20l5 5 9-9" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.3"/></svg>
          <p>No tasks yet.<br/>Add one above to get started.</p>
        </div>
      </div>

      <!-- Task footer -->
      <div class="panel-footer" id="taskFooter" hidden>
        <span id="taskSummary"></span>
        <button class="link-btn" id="clearCompletedBtn">Clear completed</button>
      </div>
    </div>

    <!-- ===== NOTES TAB ===== -->
    <div class="tab-panel hidden" id="notesPanel">

      <!-- Notes toolbar -->
      <div class="notes-toolbar">
        <button class="icon-btn" id="newNoteBtn" title="New note">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M7 1v12M1 7h12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
        </button>
        <span class="toolbar-label">Notes</span>
        <select class="meta-select" id="noteTagFilter">
          <option value="">All tags</option>
          <option value="work">Work</option>
          <option value="personal">Personal</option>
          <option value="ideas">Ideas</option>
          <option value="research">Research</option>
        </select>
      </div>

      <!-- Notes layout: list + editor -->
      <div class="notes-layout">
        <!-- Note list -->
        <div class="notes-list" id="noteList">
          <div class="empty-state" id="noteEmpty">
            <svg width="40" height="40" viewBox="0 0 40 40" fill="none"><rect x="6" y="6" width="28" height="28" rx="4" stroke="currentColor" stroke-width="1.5" opacity="0.3"/><path d="M13 14h14M13 20h14M13 26h8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" opacity="0.3"/></svg>
            <p>No notes yet.</p>
          </div>
        </div>
        <!-- Note editor -->
        <div class="note-editor" id="noteEditor" hidden>
          <div class="note-editor-header">
            <input type="text" id="noteTitleInput" class="note-title-input" placeholder="Note title…" maxlength="120" />
            <div class="note-editor-actions">
              <select class="meta-select" id="noteTagSelect">
                <option value="">No tag</option>
                <option value="work">Work</option>
                <option value="personal">Personal</option>
                <option value="ideas">Ideas</option>
                <option value="research">Research</option>
              </select>
              <button class="icon-btn danger" id="deleteNoteBtn" title="Delete note">
                <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M2 4h10M5 4V2.5h4V4M5.5 6.5v4M8.5 6.5v4M3 4l.7 7.5h6.6L11 4" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg>
              </button>
            </div>
          </div>
          <!-- Formatting toolbar -->
          <div class="fmt-toolbar">
            <button class="fmt-btn" data-cmd="bold" title="Bold"><b>B</b></button>
            <button class="fmt-btn" data-cmd="italic" title="Italic"><i>I</i></button>
            <button class="fmt-btn" data-cmd="underline" title="Underline"><u>U</u></button>
            <div class="fmt-divider"></div>
            <button class="fmt-btn" data-cmd="insertUnorderedList" title="Bullet list">•≡</button>
            <button class="fmt-btn" data-cmd="insertOrderedList" title="Numbered list">1≡</button>
            <div class="fmt-divider"></div>
            <button class="fmt-btn" data-cmd="removeFormat" title="Clear format">Tx</button>
          </div>
          <div class="note-body" id="noteBody" contenteditable="true" spellcheck="true" data-placeholder="Start writing…"></div>
          <div class="note-editor-footer">
            <span id="noteLastSaved" class="note-meta-text"></span>
            <button class="save-btn" id="saveNoteBtn">Save note</button>
          </div>
        </div>
      </div>
    </div>

    <!-- ===== SETTINGS PANEL ===== -->
    <div class="settings-panel" id="settingsPanel" hidden>
      <div class="settings-header">
        <span>Settings</span>
        <button class="icon-btn" id="settingsClose">
          <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M1 1l10 10M11 1L1 11" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
        </button>
      </div>
      <div class="settings-body">
        <label class="setting-row">
          <span>Theme</span>
          <select class="meta-select" id="themeSelect">
            <option value="dark">Dark</option>
            <option value="light">Light</option>
          </select>
        </label>
        <label class="setting-row">
          <span>Default tab</span>
          <select class="meta-select" id="defaultViewSelect">
            <option value="tasks">Tasks</option>
            <option value="notes">Notes</option>
          </select>
        </label>
        <div class="setting-divider"></div>
        <label class="setting-row">
          <span>Export data (JSON)</span>
          <button class="link-btn" id="exportBtn">Export</button>
        </label>
        <label class="setting-row">
          <span>Import data (JSON)</span>
          <button class="link-btn" id="importBtn">Import</button>
          <input type="file" id="importFile" accept=".json" style="display:none" />
        </label>
        <div class="setting-divider"></div>
        <label class="setting-row danger-row">
          <span>Clear all data</span>
          <button class="link-btn danger" id="clearAllBtn">Clear</button>
        </label>
      </div>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast" hidden></div>

  </div>
  <script src="popup.js"></script>
</body>
</html>
